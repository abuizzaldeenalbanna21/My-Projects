<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Facial Clinic Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background: #f7fafd;
            min-height: 100vh;
        }
        .register-card {
            max-width: 420px;
            margin: 80px auto;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.09);
            background: #fff;
            padding: 36px 28px;
        }
        .register-title {
            color: #ff4bd2;
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 24px;
            text-align: center;
        }
        .btn-facial {
            background: #ff4bd2;
            color: #fff;
            border-radius: 50px;
            font-size: 18px;
            padding: 10px 0;
            width: 100%;
            border: none;
            transition: background 0.2s;
        }
        .btn-facial:hover {
            background: #e03bb5;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="register-title">Create Facial Clinic Account</div>
        <form method="post" action="registerF_submit.php">
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" class="form-control" id="fullname" name="fullname" required>
            </div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" class="form-control" id="username" name="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" class="form-control" id="email" name="email" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" required autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-facial mt-3">Register</button>
            <div class="text-center mt-3">
                <a href="loginF.html" style="color:#ff4bd2; font-size:15px;">Already have an account? Login</a>
            </div>
        </form>
    </div>
</body>
</html>
