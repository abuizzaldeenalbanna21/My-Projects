<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Facial Clinic Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background: #f7fafd;
            min-height: 100vh;
        }
        .login-card {
            max-width: 400px;
            margin: 80px auto;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.09);
            background: #fff;
            padding: 36px 28px;
        }
        .login-title {
            color: #ff4bd2;
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 24px;
            text-align: center;
        }
        .btn-facial {
            background: #ff4bd2;
            color: #fff;
            border-radius: 50px;
            font-size: 18px;
            padding: 10px 0;
            width: 100%;
            border: none;
            transition: background 0.2s;
        }
        .btn-facial:hover {
            background: #e03bb5;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-title">Facial Clinic Login</div>
        <form method="post" action="facial_dashboard.php">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" class="form-control" id="username" name="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password">
            </div>
            <div class="text-right mb-2">
                <a href="#" style="color:#ff4bd2; font-size:15px;">Forgot password?</a>
            </div>
            <button type="submit" class="btn btn-facial mt-3">Login</button>
            <div class="text-center mt-3">
                <a href="registerF.html" style="color:#ff4bd2; font-size:15px;">Create an account</a>
            </div>
        </form>
    </div>
</body>
</html>
